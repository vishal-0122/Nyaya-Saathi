name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
    paths:
      - "app/**"
      - "frontend/**"
      - "scripts/**"
      - "requirements.txt"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".dockerignore"
  pull_request:
    branches:
      - main
      - master
    paths:
      - "app/**"
      - "frontend/**"
      - "scripts/**"
      - "requirements.txt"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".dockerignore"
  workflow_dispatch:

env:
  IMAGE_NAME: vishal0122/nyaya-saathi-app

jobs:
  ci-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (CI validation only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cd-publish:
    runs-on: ubuntu-latest
    needs: ci-build
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
